name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
        env:
          # Build-time env so Next can compile; real secrets are runtime-only.
          JWT_SECRET: ci-placeholder-secret-do-not-use-in-prod
          FIREBASE_PROJECT_ID: ci-placeholder
          FIREBASE_ADMIN_SA_KEY: e30= # base64({}) — never executed in CI build
