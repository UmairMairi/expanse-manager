name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
        env:
          # Build-time env so Next can compile; real secrets are runtime-only.
          JWT_SECRET: ci-placeholder-secret-do-not-use-in-prod
          FIREBASE_PROJECT_ID: ci-placeholder
          FIREBASE_ADMIN_SA_KEY: e30= # base64({}) — never executed in CI build

  firestore-rules:
    name: Deploy Firestore rules
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Skip if FIREBASE_TOKEN secret is absent
        id: gate
        run: |
          if [ -z "${{ secrets.FIREBASE_TOKEN }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::FIREBASE_TOKEN secret not set — skipping rules deploy"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install Firebase CLI
        if: steps.gate.outputs.skip == 'false'
        run: npm install -g firebase-tools@latest
      - name: Deploy Firestore rules
        if: steps.gate.outputs.skip == 'false'
        run: |
          firebase deploy --only firestore:rules \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}" \
            --token "${{ secrets.FIREBASE_TOKEN }}" \
            --non-interactive
